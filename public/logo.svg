<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flowGradient1" x1="0" y1="100" x2="200" y2="100" gradientUnits="userSpaceOnUse">
