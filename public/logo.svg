  <path d="M10 150C50 180 100 120 150 140C200 160 180 80 150 50C120 20 50 50 30 80" stroke="url(#flowGradient1)" stroke-width="8" stroke-linecap="round" opacity="0.5" filter="url(#blurFlow)"/>

  <path d="M50 160C60 140 90 60 100 40" stroke="url(#flowGradient2)" stroke-width="12" stroke-linecap="round"/>
  <path d="M100 40C110 60 140 140 150 160C160 180 120 180 100 160" stroke="url(#flowGradient1)" stroke-width="12" stroke-linecap="round"/>
  <path d="M75 120C100 130 125 110 140 120" stroke="white" stroke-width="4" stroke-opacity="0.7" stroke-linecap="round"/>
  
  <circle cx="100" cy="40" r="5" fill="white">
