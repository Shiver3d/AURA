      <stop offset="0.5" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#8A2BFF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="flowGradient2" x1="200" y1="50" x2="0" y2="150" gradientUnits="userSpaceOnUse">
